services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rice_traceability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rice_traceability
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE_NAME: riceTraceability
      FABRIC_MOCK_MODE: ${FABRIC_MOCK_MODE:-false}
      FABRIC_PEER_ENDPOINT: peer0.org1.example.com:7051
      FABRIC_PEER_HOST_ALIAS: peer0.org1.example.com
      FABRIC_PEER_TLS_CERT: /app/fabric/crypto/peer-tls-ca.crt
      FABRIC_ORDERER_ENDPOINT: orderer.example.com:7050
      FABRIC_ORDERER_HOST_ALIAS: orderer.example.com
      FABRIC_ORDERER_TLS_CERT: /app/fabric/crypto/orderer-tls-ca.crt
      FABRIC_CERT: /app/fabric/crypto/admin-cert.pem
      FABRIC_KEY: /app/fabric/crypto/admin-key.pem
      FABRIC_MSP_ID: Org1MSP
    volumes:
      - ./backend/src/app.js:/app/src/app.js
      - ./backend/src/routes:/app/src/routes
      - ./backend/src/services:/app/src/services
      - ./backend/src/middleware:/app/src/middleware
      - ./backend/src/models:/app/src/models
      - ./backend/src/config:/app/src/config
      - ./backend/src/utils:/app/src/utils
      - ./backend/src/seeders:/app/src/seeders
      - ./backend/fabric/crypto:/app/fabric/crypto
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
      - fabric-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "start"
      - "app"
      - "--config"
      - "/etc/ngrok/ngrok.yml"
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok/ngrok.yml:ro
    ports:
      - "4040:4040"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network

  explorer-db:
    image: ghcr.io/hyperledger-labs/explorer-db:latest
    environment:
      DATABASE_DATABASE: fabricexplorer
      DATABASE_USERNAME: hppoc
      DATABASE_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hppoc -d fabricexplorer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - fabric-network

  explorer:
    image: ghcr.io/hyperledger-labs/explorer:latest
    ports:
      - "8080:8080"
    volumes:
      - ./explorer/config.json:/opt/explorer/app/platform/fabric/config.json
      - ./explorer/connection-profile:/opt/explorer/app/platform/fabric/connection-profile
      - ./organizations:/opt/explorer/app/platform/fabric/crypto
    environment:
      - DATABASE_HOST=explorer-db
      - DATABASE_DATABASE=fabricexplorer
      - DATABASE_USERNAME=hppoc
      - DATABASE_PASSWD=password
      - LOG_LEVEL_APP=info
    depends_on:
      explorer-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fabric-network

networks:
  app-network:
    driver: bridge
  fabric-network:
    external: true
    name: network_rice-network

volumes:
  pgdata:
