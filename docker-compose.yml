version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rice_traceability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rice_traceability
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE_NAME: riceTraceability
      FABRIC_MOCK_MODE: ${FABRIC_MOCK_MODE:-false}
      FABRIC_PEER_ENDPOINT: peer0.org1.example.com:7051
      FABRIC_PEER_HOST_ALIAS: peer0.org1.example.com
      FABRIC_PEER_TLS_CERT: /app/fabric/crypto/peer-tls-ca.crt
      FABRIC_ORDERER_ENDPOINT: orderer.example.com:7050
      FABRIC_ORDERER_HOST_ALIAS: orderer.example.com
      FABRIC_ORDERER_TLS_CERT: /app/fabric/crypto/orderer-tls-ca.crt
      FABRIC_CERT: /app/fabric/crypto/admin-cert.pem
      FABRIC_KEY: /app/fabric/crypto/admin-key.pem
      FABRIC_MSP_ID: Org1MSP
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
      - fabric-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  fabric-network:
    external: true
    name: network_rice-network

volumes:
  pgdata:
